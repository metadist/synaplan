nelmio_api_doc:
    documentation:
        info:
            title: Synaplan API
            description: Synaplan AI Assistant API Documentation
            # Sourced from APP_VERSION (git tag, set at build time), matching the
            # runtime config's build.version. Falls back to 'dev' locally.
            version: '%env(default:app_version_default:APP_VERSION)%'
        servers:
            - url: http://localhost:8000
              description: Local development server
        components:
            securitySchemes:
                CookieAuth:
                    type: apiKey
                    in: cookie
                    name: access_token
                    description: 'HttpOnly cookie-based authentication. Tokens are set automatically on login.'
                Bearer:
                    type: http
                    scheme: bearer
                    description: 'Bearer token for SSE connections. Get token from /api/v1/auth/token endpoint.'
    areas:
        path_patterns:
            - ^/api(?!/doc$) # Accepts all routes except /api/doc
