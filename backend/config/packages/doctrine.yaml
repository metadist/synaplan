parameters:
    # Tables that are NOT ORM entities and must be excluded from schema diffing /
    # validation. Each table listed here is framework-managed (e.g. Symfony Messenger's
    # Doctrine transport creates `messenger_messages` on demand). In APP_ENV=test the
    # messenger transports are overridden to `in-memory://` (see
    # config/packages/messenger.yaml `when@test`), which means
    # `doctrine:schema:validate` would otherwise see the table as orphaned and
    # propose DROPping it. The filter is a regex applied to table names by DBAL's
    # comparator — migrations still run normally because they use raw
    # `addSql(...)`, not schema diff. Keep the list in sync across ADD events.
    app.doctrine.schema_filter: '~^(?!messenger_messages$).*$~'

doctrine:
    dbal:
        default_connection: default
        types:
            vector: App\Doctrine\VectorType
        connections:
            default:
                url: '%env(resolve:DATABASE_WRITE_URL)%'
                driver: 'pdo_mysql'
                # IMPORTANT: the "mariadb-" prefix is what makes DBAL pick MariaDBPlatform
                # (AbstractMySQLDriver::getDatabasePlatform uses stripos($version, 'mariadb')).
                # Without the prefix, DBAL falls through to MySQL84Platform, whose MySQL
                # schema introspection path does NOT strip the surrounding quotes that
                # MariaDB >= 10.2.7 wraps around string defaults in information_schema.
                # That single missing detection was the real cause of the phantom diffs
                # that previously forced `doctrine:schema:validate --skip-sync` (see #824).
                server_version: 'mariadb-12.2.2'
                charset: utf8mb4
                profiling_collect_backtrace: '%kernel.debug%'
                schema_filter: '%app.doctrine.schema_filter%'
                mapping_types:
                    vector: vector

            read:
                url: '%env(resolve:DATABASE_READ_URL)%'
                driver: 'pdo_mysql'
                server_version: 'mariadb-12.2.2'
                charset: utf8mb4
                profiling_collect_backtrace: '%kernel.debug%'
                schema_filter: '%app.doctrine.schema_filter%'
                mapping_types:
                    vector: vector

    orm:
        default_entity_manager: default
        
        entity_managers:
            default:
                connection: default
                naming_strategy: App\Doctrine\CustomNamingStrategy
                mappings:
                    App:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Entity'
                        prefix: 'App\Entity'
                        alias: App
                        
            read:
                connection: read
                naming_strategy: App\Doctrine\CustomNamingStrategy
                mappings:
                    App:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Entity'
                        prefix: 'App\Entity'
                        alias: App
        
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            connections:
                default:
                    dbname_suffix: '_test%env(default::TEST_TOKEN)%'
                read:
                    dbname_suffix: '_test%env(default::TEST_TOKEN)%'
        # NOTE: Nested-transaction savepoints (required by dama/doctrine-test-bundle
        # to roll back per-test changes) are wired up by
        # App\DependencyInjection\Compiler\EnableTestSavepointsPass — registered in
        # App\Kernel for `test` env. The doctrine-bundle YAML key `use_savepoints`
        # is only available with DBAL 4.x and would fail config validation on the
        # DBAL 3.x line we currently ship against.

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
