doctrine:
    dbal:
        default_connection: default
        types:
            vector: App\Doctrine\VectorType
        connections:
            default:
                url: '%env(resolve:DATABASE_WRITE_URL)%'
                driver: 'pdo_mysql'
                # IMPORTANT: the "mariadb-" prefix is what makes DBAL pick MariaDBPlatform
                # (AbstractMySQLDriver::getDatabasePlatform uses stripos($version, 'mariadb')).
                # Without the prefix, DBAL falls through to MySQL84Platform, whose MySQL
                # schema introspection path does NOT strip the surrounding quotes that
                # MariaDB >= 10.2.7 wraps around string defaults in information_schema.
                # That single missing detection was the real cause of the phantom diffs
                # that previously forced `doctrine:schema:validate --skip-sync` (see #824).
                server_version: 'mariadb-12.2.2'
                charset: utf8mb4
                profiling_collect_backtrace: '%kernel.debug%'
                use_savepoints: true
                # Exclude framework-managed tables that are NOT ORM entities from schema
                # diffing / validation. `messenger_messages` is created and maintained by
                # Symfony Messenger's Doctrine transport and has no matching entity; in
                # `APP_ENV=test` the messenger transports are overridden to `in-memory://`
                # (see config/packages/messenger.yaml `when@test`), which means
                # `doctrine:schema:validate` would otherwise see the table as orphaned
                # and propose DROPping it. The filter is a plain regex applied to table
                # names by DBAL's comparator — migrations still run normally because
                # they use raw `addSql(...)`, not schema diff.
                schema_filter: '~^(?!messenger_messages$).*$~'
                mapping_types:
                    vector: vector

            read:
                url: '%env(resolve:DATABASE_READ_URL)%'
                driver: 'pdo_mysql'
                server_version: 'mariadb-12.2.2'
                charset: utf8mb4
                profiling_collect_backtrace: '%kernel.debug%'
                use_savepoints: true
                schema_filter: '~^(?!messenger_messages$).*$~'
                mapping_types:
                    vector: vector

    orm:
        default_entity_manager: default
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        
        entity_managers:
            default:
                connection: default
                naming_strategy: App\Doctrine\CustomNamingStrategy
                mappings:
                    App:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Entity'
                        prefix: 'App\Entity'
                        alias: App
                        
            read:
                connection: read
                naming_strategy: App\Doctrine\CustomNamingStrategy
                mappings:
                    App:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Entity'
                        prefix: 'App\Entity'
                        alias: App
        
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            connections:
                default:
                    dbname_suffix: '_test%env(default::TEST_TOKEN)%'
                read:
                    dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
