# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Sessions live in Redis (see services.yaml for the wired RedisSessionHandler).
    # Rationale: the production cluster runs ≥3 backend nodes behind a load
    # balancer — file-based sessions would be node-local and force sticky
    # routing (or silently log users out on every reconnect). Putting them in
    # the same Redis we already use for cache/lock/messenger gives all nodes
    # a shared store without adding infrastructure. `gc_maxlifetime` matches
    # the handler's TTL (7 days) so PHP's GC and Redis's expiry agree.
    # The session is still STARTED ONLY if you read or write from it.
    session:
        handler_id: Symfony\Component\HttpFoundation\Session\Storage\Handler\RedisSessionHandler
        gc_maxlifetime: 604800

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        # PHPUnit must not require a running Redis — fall back to mock_file storage.
        # The handler_id binding above is overridden by storage_factory_id here.
        session:
            storage_factory_id: session.storage.factory.mock_file
            handler_id: ~

when@dev:
    framework:
        test: ~
