# Rate-limiter named-limiter definitions.
#
# The shared cache pool that backs every limiter (`cache.rate_limiter`) is
# declared in `config/packages/cache.yaml` alongside all other pools so the
# `when@test` override path is consistent. Defining the pool in two YAML
# files made Symfony's CachePass retain the prod Redis `provider` argument
# as ctor arg 0 even when the test profile swapped the adapter, which then
# crashed kernel boot with "argument 1 doesn't exist in" the test adapter.
#
# Add named limiters here when needed (login attempts, message quotas, etc.):
#
#   framework:
#       rate_limiter:
#           login:
#               policy: 'fixed_window'
#               limit: 5
#               interval: '15 minutes'
#               cache_pool: 'cache.rate_limiter'

framework:
    rate_limiter:
        # Anonymous Centrifugo token endpoints (PUBLIC_ACCESS). Keyed per
        # client IP in RealtimeTokenController. Sized for legitimate traffic —
        # one active visitor needs ~3 requests/minute (connection token +
        # session/typing subscription refreshes at 60s TTL), so 60/120 per
        # minute tolerates dozens of visitors behind one NAT while making
        # widget/session UUID enumeration useless (UUIDv4 space at ≤2 guesses
        # per second).
        realtime_widget_token:
            policy: 'sliding_window'
            limit: 60
            interval: '1 minute'
            cache_pool: 'cache.rate_limiter'
        realtime_subscribe_anon:
            policy: 'sliding_window'
            limit: 120
            interval: '1 minute'
            cache_pool: 'cache.rate_limiter'
