framework:
    cache:
        prefix_seed: synaplan_sf
        
        # Filesystem cache (Redis removed)
        app: cache.adapter.filesystem
        
        pools:
            # Provider status cache (short TTL)
            cache.provider_status:
                adapter: cache.adapter.filesystem
                default_lifetime: 60
                
            # Model configuration cache
            cache.model_config:
                adapter: cache.adapter.filesystem
                default_lifetime: 3600
                
            # User config cache
            cache.user_config:
                adapter: cache.adapter.filesystem
                default_lifetime: 1800

            # NOTE: Widget real-time events are no longer cache-backed. A node-local
            # filesystem cache is invisible to other nodes behind the load balancer,
            # which dropped operator/visitor messages until a reload. They now live in
            # the Galera-replicated BWIDGET_EVENTS table via DatabaseWidgetEventStore.