name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

# Superseded runs on the same PR just burn runner capacity (and delay other
# runs waiting for the limited ubuntu-latest-m pool). Push/tag runs get a
# unique group (run_id) so main runs neither serialize nor cancel each other —
# docker-push and cloudflare-deploy must never be interrupted or skipped.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: PHP Code Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.4"
          # `redis` (phpredis) is in composer.json's require for `symfony/redis-messenger`,
          # so installing without it would force `--ignore-platform-req=ext-redis` here too.
          extensions: mbstring, xml, ctype, iconv, intl, redis
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction --no-scripts

      - name: Run code formatting check
        working-directory: backend
        run: composer lint

  backend:
    name: Backend (PHP/Symfony)
    # Free runner on purpose: this job is off the critical path (done around
    # minute 2-3 while e2e runs until ~minute 7), PHPUnit is single-process
    # anyway, and free runners start instantly (queue p90 ~4s vs up to ~80s
    # provisioning on the ubuntu-latest-m pool). Keeping it off the -m pool
    # also leaves the warm -m runner to frontend-build, which IS the
    # critical path. Revisit if this job ever becomes the longest one.
    runs-on: ubuntu-latest

    env:
      DATABASE_WRITE_URL: mysql://synaplan_test:synaplan_test@127.0.0.1:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4
      DATABASE_READ_URL: mysql://synaplan_test:synaplan_test@127.0.0.1:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4

    services:
      mysql:
        image: mariadb:12.3@sha256:628f228f0fd5913a220438693576b29b6fe4dc1fa0a1298c0e98579fae28635f
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: synaplan_test
          MYSQL_USER: synaplan_test
          MYSQL_PASSWORD: synaplan_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      # Redis backs cache.app, the lock + rate-limiter components and the
      # Messenger Redis Streams transport. PHPUnit needs a live instance for the
      # RedisIntegrationTest smoke suite that verifies connectivity, CRUD, and
      # version reporting against real Redis. `.env.test` points REDIS_DSN at
      # 127.0.0.1:6379. Digest pinned to match docker-compose.yml for parity
      # (Redis 7.4 — see docker-compose.yml for the Centrifugo pub/sub rationale).
      redis:
        image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.4"
          # `redis` (phpredis) is required by `symfony/redis-messenger`. Sessions
          # and cache.app use Predis (pure PHP) so they don't need it, but `composer
          # install` would refuse to run without it on the platform-req check.
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, zip, gd, curl, bcmath, exif, pcntl, opcache, readline, soap, sodium, ffi, imagick, grpc, redis
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install protoc from base image
        run: |
          BASE_IMAGE=$(grep -oP 'FROM \K\S+' _docker/backend/Dockerfile | head -1)
          id=$(docker create "$BASE_IMAGE")
          trap "docker rm $id" EXIT
          sudo docker cp $id:/usr/local/bin/protoc /usr/local/bin/protoc
          protoc --version

      - name: Create .env file
        working-directory: backend
        run: cp .env.test .env
        # Job env (e.g. DATABASE_WRITE_URL from services) overrides when PHP runs

      - name: Create plugins symlink
        run: sudo ln -s ${{ github.workspace }}/plugins /plugins

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Security audit
        working-directory: backend
        run: composer audit || true

      - name: Run PHPStan
        working-directory: backend
        run: composer phpstan

      - name: Setup database schema
        working-directory: backend
        # Migrations are the single source of truth. We deliberately do NOT run
        # `doctrine:schema:update --force` here — if an entity change is missing
        # a migration, CI MUST fail so we surface the gap before deploy.
        run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

      - name: Verify schema matches entities (no migration drift)
        working-directory: backend
        # Full schema validation: catches broken ORM mapping AND any entity↔DB
        # drift. Fails any PR that changes an entity without shipping a matching
        # Doctrine migration. Unblocked by:
        #   - doctrine/dbal 4.x upgrade (#781)
        #   - `server_version: mariadb-*` in doctrine.yaml (correct platform routing)
        #   - Version20260423000000 + Version20260429000000 (schema reconciliation)
        # See docs/MIGRATIONS.md for details.
        run: php bin/console doctrine:schema:validate

      - name: Load demo fixtures
        working-directory: backend
        # Loads only dev/test demo data (admin/demo/test users). Production-essential
        # catalog data (models, prompts, defaults, rate limits) is handled by app:seed below.
        run: php bin/console doctrine:fixtures:load --no-interaction

      - name: Seed catalogs (models, prompts, defaults, rate limits)
        working-directory: backend
        # Idempotent seeders that populate BCONFIG with rate limits, default model bindings,
        # AI model catalog and system prompts. Required for integration tests that exercise
        # StorageQuotaService, MessageController, SummaryController, etc.
        run: php bin/console app:seed --no-interaction

      - name: Run PHPUnit tests
        working-directory: backend
        run: php bin/phpunit

      - name: Run migrations-bootstrap bash tests
        run: bash _docker/backend/tests/test-migrations-bootstrap.sh

  frontend-build:
    name: Frontend Build
    # Head of the critical path (frontend-build → docker-build → e2e), so it
    # starts at t=0 with no `needs`: it dumps the OpenAPI spec itself (PHP
    # setup costs ~35s from caches) instead of waiting for a separate job —
    # a mid-run job hop costs ~40-50s runner-provisioning latency on the
    # ubuntu-latest-m pool. The spec is uploaded as the `openapi-spec`
    # artifact for frontend-checks and mobile-release-artifacts.yml.
    # nelmio:apidoc:dump compiles the container but never touches the DB
    # (Doctrine connects lazily), so no MariaDB service is needed here.
    #
    # This is the ONLY job on the paid 16-core pool: the parallel Vite builds
    # are the one workload where the cores shorten the critical path. All
    # other former -m jobs moved to free runners so the warm -m runner is
    # reliably available for this job at t=0.
    runs-on: ubuntu-latest-m

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.4"
          # Same extension set as the backend job so `composer install` passes
          # the platform-req check (see backend job for the rationale).
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, zip, gd, curl, bcmath, exif, pcntl, opcache, readline, soap, sodium, ffi, imagick, grpc, redis
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install protoc from base image
        run: |
          BASE_IMAGE=$(grep -oP 'FROM \K\S+' _docker/backend/Dockerfile | head -1)
          id=$(docker create "$BASE_IMAGE")
          trap "docker rm $id" EXIT
          sudo docker cp $id:/usr/local/bin/protoc /usr/local/bin/protoc
          protoc --version

      - name: Create .env file
        working-directory: backend
        run: cp .env.test .env

      - name: Create plugins symlink
        run: sudo ln -s ${{ github.workspace }}/plugins /plugins

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Generate OpenAPI spec
        working-directory: backend
        run: php bin/console nelmio:apidoc:dump --format=json > openapi-spec.json

      - name: Upload OpenAPI spec artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openapi-spec
          path: backend/openapi-spec.json
          retention-days: 1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Copy OpenAPI spec for schema generation
        # src/generated/ is gitignored and absent in a fresh checkout
        run: |
          mkdir -p frontend/src/generated
          cp backend/openapi-spec.json frontend/src/generated/openapi-spec.json

      - name: Generate Zod schemas from OpenAPI spec
        working-directory: frontend
        run: |
          # Use OpenAPI spec from generated folder
          npx openapi-zod-client src/generated/openapi-spec.json -o src/generated/api-schemas.ts --template schema-template.hbs
          # Run post-processing to create readable aliases
          node scripts/generate-schemas.js --skip-fetch
          # Clean up the OpenAPI spec file (we only need the generated schemas)
          rm src/generated/openapi-spec.json

      - name: Build app and widget (parallel)
        working-directory: frontend
        # `npm run build` would also run check:types — that already gates the
        # merge via frontend-checks, so call vite directly here to keep the
        # critical path lean. Separate outDirs (dist/ vs dist-widget/), so the
        # two builds can run concurrently.
        run: |
          npx vite build & APP_PID=$!
          npx vite build --config vite.config.widget.ts & WIDGET_PID=$!
          wait "$APP_PID"
          wait "$WIDGET_PID"

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

      - name: Upload widget build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: widget-dist
          path: frontend/dist-widget/
          retention-days: 1

  frontend-checks:
    name: Frontend (Vue/TypeScript)
    # Format check, lint, vue-tsc and Vitest — everything that gates merging
    # but that docker-build/e2e don't need to wait for. Consumes the
    # openapi-spec artifact from frontend-build; runs off the critical path
    # (plenty of slack before the e2e jobs finish), so a free instant-start
    # runner beats the paid pool: vue-tsc is single-threaded anyway and the
    # -m pool has up to ~80s provisioning latency for mid-run job requests.
    runs-on: ubuntu-latest
    needs: [frontend-build]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Download OpenAPI spec artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: openapi-spec
          path: frontend/src/generated/

      - name: Generate Zod schemas from OpenAPI spec
        working-directory: frontend
        run: |
          # Use OpenAPI spec from generated folder
          npx openapi-zod-client src/generated/openapi-spec.json -o src/generated/api-schemas.ts --template schema-template.hbs
          # Run post-processing to create readable aliases
          node scripts/generate-schemas.js --skip-fetch
          # Clean up the OpenAPI spec file (we only need the generated schemas)
          rm src/generated/openapi-spec.json

      - name: Check code formatting
        working-directory: frontend
        run: npm run format:check

      - name: Lint code
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run check:types

      - name: Run tests
        working-directory: frontend
        run: npm run test

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [frontend-build]
    outputs:
      image-tags: ${{ steps.meta.outputs.tags }}
      image-labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download frontend build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Download widget build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: widget-dist
          path: frontend/dist-widget/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For main branch, tag as 'latest'
            type=raw,value=latest,enable={{is_default_branch}}
            # For tags, extract semantic version (removes 'v' prefix automatically)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # For PRs, tag with PR number
            type=ref,event=pr

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: _docker/backend/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Export to tar file for sharing between jobs
          outputs: type=docker,dest=/tmp/docker-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-image
          path: /tmp/docker-image.tar
          retention-days: 1

  e2e:
    name: E2E Tests (${{ matrix.browser }}${{ matrix.variant && format(' {0}', matrix.variant) || '' }}${{ matrix.auth_method == 'oidc' && ' OIDC' || matrix.auth_method == 'oidc-redirect' && ' OIDC Redirect' || '' }}${{ matrix.shard && format(' [{0}]', matrix.shard) || '' }})
    # E2E jobs run on free ubuntu-latest runners (unlimited capacity for public
    # repos) to avoid queue contention from the limited ubuntu-latest-m pool.
    # Chromium and Firefox are sharded (--shard=N/M) so each half finishes in
    # ~50% of the time; the free runner pool ensures all shards start instantly.
    runs-on: ubuntu-latest
    needs: [docker-build]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Standard password auth — chromium sharded into 2 parallel jobs
          - browser: chromium
            variant: ""
            auth_method: password
            compose_profiles: ""
            npm_script: "test:e2e"
            grep_filter: "@ci"
            shard: "1/2"
          - browser: chromium
            variant: ""
            auth_method: password
            compose_profiles: ""
            npm_script: "test:e2e"
            grep_filter: "@ci"
            shard: "2/2"
          # Standard password auth — firefox sharded into 2 parallel jobs
          - browser: firefox
            variant: ""
            auth_method: password
            compose_profiles: ""
            npm_script: "test:e2e:firefox"
            grep_filter: "@ci"
            shard: "1/2"
          - browser: firefox
            variant: ""
            auth_method: password
            compose_profiles: ""
            npm_script: "test:e2e:firefox"
            grep_filter: "@ci"
            shard: "2/2"
          # Mobile viewport layout guard (chromium device emulation; runs the
          # @layout suite only — see frontend/tests/e2e/playwright.config.ts)
          - browser: chromium
            variant: "Mobile"
            auth_method: password
            compose_profiles: ""
            npm_script: "test:e2e:mobile"
            grep_filter: "@ci"
            shard: ""
          # OIDC auth (chromium only — auth flow testing, not browser compat)
          - browser: chromium
            variant: ""
            auth_method: oidc
            compose_profiles: "--profile oidc"
            npm_script: "test:e2e:oidc"
            grep_filter: "@oidc"
            shard: ""
          # OIDC auto-redirect (starts app with OIDC_AUTO_REDIRECT=true)
          - browser: chromium
            variant: ""
            auth_method: oidc-redirect
            compose_profiles: "--profile oidc"
            npm_script: "test:e2e:oidc-redirect"
            grep_filter: ""
            shard: ""
    env:
      APP_IMAGE: synaplan-test:ci
      APP_URL: http://localhost:8001
      # Job-level (not step-level) so the backgrounded `up -d` and the later
      # `up --wait` see the same value — a mismatch would recreate containers.
      OIDC_AUTO_REDIRECT: ${{ matrix.auth_method == 'oidc-redirect' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download Docker image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image
          path: /tmp

      - name: Add host.docker.internal to /etc/hosts
        if: contains(matrix.auth_method, 'oidc')
        run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      - name: Start test stack in background
        # docker load + compose pull + up take ~1.5 min and don't depend on
        # Node/Playwright, so they run in the background while the following
        # steps set up the test runner. "Wait for test services" joins on this.
        run: |
          COMPOSE="docker compose -f docker-compose.test.yml -f docker-compose.test.ci.yml"
          PROFILE="${{ matrix.compose_profiles }}"
          (
            set -e
            docker load -i /tmp/docker-image.tar
            echo "Loaded images:"
            docker images

            # Tag the first loaded image as synaplan-test:ci for docker-compose
            IMAGE_TAG=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -n 1)
            echo "Tagging $IMAGE_TAG as synaplan-test:ci"
            docker tag $IMAGE_TAG synaplan-test:ci

            n=0; until $COMPOSE $PROFILE pull; do n=$((n+1)); [ "$n" -ge 4 ] && exit 1; sleep $((n*15)); done

            # app_test entrypoint loads fixtures on first run (APP_ENV=test, empty DB)
            # so TestProvider model (-1 > -7) and admin user exist for E2E.
            echo "Starting services..."
            $COMPOSE $PROFILE up -d
            touch /tmp/stack-started.ok
          ) > /tmp/stack-startup.log 2>&1 &
          echo $! > /tmp/stack-startup.pid

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Playwright dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-${{ matrix.browser }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: |
          sudo sed -i '/azure\.archive\.ubuntu\.com/d' /etc/apt/apt-mirrors.txt
          npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: |
          sudo sed -i '/azure\.archive\.ubuntu\.com/d' /etc/apt/apt-mirrors.txt
          npx playwright install-deps ${{ matrix.browser }}

      - name: Wait for test services
        run: |
          COMPOSE="docker compose -f docker-compose.test.yml -f docker-compose.test.ci.yml"
          PROFILE="${{ matrix.compose_profiles }}"

          echo "Waiting for background stack startup to finish..."
          PID=$(cat /tmp/stack-startup.pid)
          while kill -0 "$PID" 2>/dev/null; do sleep 2; done
          echo "=== Stack startup log ==="
          cat /tmp/stack-startup.log
          if [ ! -f /tmp/stack-started.ok ]; then
            echo "Stack startup failed (see log above)."
            exit 1
          fi

          # Start following logs in background
          $COMPOSE $PROFILE logs -f &

          echo "Waiting for services to be healthy..."
          $COMPOSE $PROFILE up --wait || {
            echo "Failed to start services. Status:"
            $COMPOSE $PROFILE ps
            echo ""
            echo "Container logs:"
            $COMPOSE $PROFILE logs
            exit 1
          }

          # Wait for Keycloak provisioning to complete (if OIDC)
          if [[ "${{ matrix.auth_method }}" == oidc* ]]; then
            echo "Waiting for Keycloak provisioning..."
            # Use -a to include exited containers (setup is a one-shot sidecar)
            SETUP_ID=$($COMPOSE $PROFILE ps -a -q keycloak_setup)
            if [ -n "$SETUP_ID" ]; then
              docker wait "$SETUP_ID" || true
            fi
          fi

          echo "Services are ready!"
          $COMPOSE $PROFILE ps

      - name: Run E2E tests
        working-directory: frontend
        env:
          BASE_URL: http://localhost:8001
          KEYCLOAK_URL: http://host.docker.internal:8081
          KEYCLOAK_HTTPS_URL: https://host.docker.internal:8444
          # Test stack maps MailHog's web UI/API to host port 8026 by default
          # (docker-compose.test.yml) so it can run alongside the dev stack (8025).
          MAILHOG_URL: http://localhost:8026
        run: |
          echo "============================================"
          echo "Running E2E tests with ${{ matrix.browser }} (${{ matrix.auth_method }})${{ matrix.shard && format(' shard {0}', matrix.shard) || '' }}"
          echo "============================================"
          EXTRA_ARGS="${{ matrix.grep_filter && format('--grep "{0}"', matrix.grep_filter) || '' }} ${{ matrix.shard && format('--shard={0}', matrix.shard) || '' }}"
          EXTRA_ARGS=$(echo "$EXTRA_ARGS" | xargs)
          if [ -n "$EXTRA_ARGS" ]; then
            npm run ${{ matrix.npm_script }} -- $EXTRA_ARGS
          else
            npm run ${{ matrix.npm_script }}
          fi

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-results-${{ strategy.job-index }}-${{ matrix.browser }}${{ matrix.variant && format('-{0}', matrix.variant) || '' }}-${{ matrix.auth_method }}
          path: |
            frontend/tests/e2e/test-results/
            frontend/tests/e2e/reports/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop test services
        if: always()
        run: |
          COMPOSE="docker compose -f docker-compose.test.yml -f docker-compose.test.ci.yml"
          PROFILE="${{ matrix.compose_profiles }}"
          $COMPOSE $PROFILE down -v

  e2e-visual:
    # Layer 3 of the UI guard: hard-capped visual snapshots (@visual project).
    # Skips gracefully while no baselines are committed — generate them with
    # the "Update visual baselines" workflow dispatch (same runner image,
    # never from a laptop).
    name: E2E Visual Snapshots
    # MUST match the runner used by visual-baselines.yml — snapshots are
    # rendering-environment sensitive.
    runs-on: ubuntu-latest
    needs: [docker-build]
    env:
      APP_IMAGE: synaplan-test:ci
      APP_URL: http://localhost:8001

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check for committed baselines
        id: baselines
        run: |
          if compgen -G "frontend/tests/e2e/tests/*-snapshots" > /dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No visual baselines committed yet — skipping (run the 'Update visual baselines' dispatch to create them)."
          fi

      - name: Download Docker image artifact
        if: steps.baselines.outputs.exists == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        if: steps.baselines.outputs.exists == 'true'
        run: |
          docker load -i /tmp/docker-image.tar
          IMAGE_TAG=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -n 1)
          docker tag $IMAGE_TAG synaplan-test:ci

      - name: Start test services
        if: steps.baselines.outputs.exists == 'true'
        run: |
          COMPOSE="docker compose -f docker-compose.test.yml -f docker-compose.test.ci.yml"
          n=0; until $COMPOSE pull; do n=$((n+1)); [ "$n" -ge 4 ] && exit 1; sleep $((n*15)); done
          $COMPOSE up -d
          $COMPOSE up --wait || { $COMPOSE ps; $COMPOSE logs; exit 1; }

      - name: Setup Node.js
        if: steps.baselines.outputs.exists == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Playwright dependencies
        if: steps.baselines.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        if: steps.baselines.outputs.exists == 'true'
        working-directory: frontend
        run: |
          sudo sed -i '/azure\.archive\.ubuntu\.com/d' /etc/apt/apt-mirrors.txt
          npx playwright install --with-deps chromium

      - name: Run visual snapshot tests
        if: steps.baselines.outputs.exists == 'true'
        working-directory: frontend
        env:
          BASE_URL: http://localhost:8001
        run: npm run test:e2e:visual

      - name: Upload results
        if: always() && steps.baselines.outputs.exists == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-results-visual
          path: |
            frontend/tests/e2e/test-results/
            frontend/tests/e2e/reports/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop test services
        if: always() && steps.baselines.outputs.exists == 'true'
        run: |
          docker compose -f docker-compose.test.yml -f docker-compose.test.ci.yml down -v

  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    # backend and frontend-checks are listed explicitly: docker-build no longer
    # depends on them transitively (frontend-build has no `needs`), and a
    # `latest` image must never be published when tests or checks fail —
    # e.g. a semantic conflict between two individually green PRs surfacing
    # only on the merged main. Costs no time: e2e always finishes last.
    needs: [docker-build, e2e, backend, frontend-checks]
    # Only run on main branch or tags (e2e tests already passed)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load -i /tmp/docker-image.tar
          echo "Loaded images:"
          docker images

      - name: Log in to the Container registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          echo "Pushing all tags..."
          docker images --format "{{.Repository}}:{{.Tag}}" | grep "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | while read -r tag; do
            echo "Pushing: $tag"
            docker push "$tag"
          done
          echo "✅ All images pushed successfully"

  cloudflare-deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    # Same rationale as docker-push: never deploy while tests/checks fail.
    needs: [e2e, backend, frontend-checks]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: cloudflare
        run: npm ci

      - name: Deploy to Cloudflare
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env production

  # Gate job that depends on all checks - only this needs to be required in branch protection
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, backend, frontend-build, frontend-checks, docker-build, e2e, e2e-visual, docker-push, cloudflare-deploy]
    if: always()
    steps:
      - name: Check for failures
        if: |
          !cancelled() && (
            needs.lint.result != 'success' ||
            needs.backend.result != 'success' ||
            needs.frontend-build.result != 'success' ||
            needs.frontend-checks.result != 'success' ||
            needs.docker-build.result != 'success' ||
            needs.e2e.result != 'success' ||
            needs.e2e-visual.result != 'success' ||
            (needs.docker-push.result != 'success' && needs.docker-push.result != 'skipped') ||
            (needs.cloudflare-deploy.result != 'success' && needs.cloudflare-deploy.result != 'skipped')
          )
        run: |
          echo "One or more checks failed, were cancelled, or were skipped"
          exit 1

      - name: All checks passed
        run: echo "All checks passed!"
