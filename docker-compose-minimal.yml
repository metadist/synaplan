# Synaplan - Minimal Installation (Cloud AI only)
#
# This is a lightweight configuration for Synaplan:
# - Uses cloud AI providers (Groq, OpenAI, Anthropic) instead of local Ollama
# - Skips Whisper audio transcription (faster startup)
# - Downloads ~4GB less than standard install
# - Faster startup for first-time users
#
# It still ships the small, mandatory infrastructure the app depends on:
# - redis      : shared cache / locks / rate-limiter / Messenger Redis Streams /
#                Centrifugo engine (~15MB image, capped at 256MB RAM)
# - centrifugo : WebSocket gateway for live chat takeover & realtime features
# - worker     : consumes async jobs (memories, URL crawling, reindexing)
# These are tiny compared to the ~4GB Ollama/Whisper stack this file omits.
#
# Usage:
#   docker compose -f docker-compose-minimal.yml up -d
#
# To switch to standard install (with Ollama + Whisper):
#   docker compose -f docker-compose-minimal.yml down
#   docker compose up -d
#
services:
  # Vue.js Frontend
  frontend:
    image: node:22@sha256:c601a46abb4d2ab80a9dc3da208d50d1122642d53f17a101926ace71e5a9bf1c
    container_name: synaplan-frontend
    working_dir: /app
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    environment:
      NODE_ENV: development
      BACKEND_URL: http://backend
    ports:
      - "5173:5173"
    volumes:
      - ./_docker/frontend/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
      - ./_devextras/frontend/docker-entrypoint.d:/docker-entrypoint.d:ro
      - ./frontend:/app
       # Anonymous volume to prevent host node_modules from being mounted (avoids platform-specific binary conflicts)
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - synaplan-network

  # Widget Build Watcher (dev only)
  # Memory-limited to prevent unbounded growth from Chokidar polling (#515).
  # Container auto-restarts on OOM thanks to restart policy.
  frontend-widgets:
    image: node:22@sha256:c601a46abb4d2ab80a9dc3da208d50d1122642d53f17a101926ace71e5a9bf1c
    container_name: synaplan-frontend-widgets
    working_dir: /app
    command: sh -c "npm ci && npm run build:widget -- --watch"
    environment:
      NODE_ENV: development
      NODE_OPTIONS: '--max-old-space-size=3072'
    mem_limit: 4g
    memswap_limit: 4g
    volumes:
      - ./frontend:/app
      # Anonymous volume to prevent host node_modules from being mounted
      - /app/node_modules
    restart: unless-stopped
    networks:
      - synaplan-network

  # Symfony PHP Backend
  # Serves both API and production frontend from frontend/dist
  backend:
    image: ghcr.io/metadist/synaplan:latest
    # Always build the lightweight `dev` stage locally so the image carries
    # ext-redis (phpredis) without baking the app. The published :latest can be
    # stale; reusing it breaks composer install (symfony/redis-messenger platform
    # req) and the worker's Redis Streams consumer. The dev stage is independent
    # of backend source, so every `up -d` is a cache hit after the first build.
    pull_policy: build
    build:
      context: .
      dockerfile: _docker/backend/Dockerfile
      target: dev
    container_name: synaplan-backend
    # Optional: Load extra config from backend/.env (for API keys, etc.)
    env_file:
      - path: backend/.env
        required: false
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      - /var/www/backend/var/cache
      - ./frontend/dist:/var/www/frontend:ro
      - ./frontend/dist-widget:/var/www/widgets
      - ./plugins:/plugins:ro
      - ./_docker/backend/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./_docker/backend/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
      - ./_devextras/backend/docker-entrypoint.d:/docker-entrypoint.d:ro
      # Note: No whisper_models volume - audio transcription disabled
    environment:
      APP_ENV: dev
      # APP_SECRET loaded from backend/.env (env_file above)
      APP_URL: http://localhost:8000
      PLUGINS_DIR: /plugins
      FRONTEND_URL: http://localhost:5173
      DATABASE_WRITE_URL: mysql://synaplan_user:synaplan_password@db:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4
      DATABASE_READ_URL: mysql://synaplan_user:synaplan_password@db:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4
      # No Ollama - use external AI providers
      OLLAMA_BASE_URL: ""
      TRITON_SERVER_URL: ${TRITON_SERVER_URL:-}
      TIKA_BASE_URL: http://tika:9998
      # Default to Groq (free tier available) - user should set GROQ_API_KEY in backend/.env
      AI_DEFAULT_PROVIDER: groq
      # Token Configuration
      TOKEN_SECRET: 'change_me_in_production_use_openssl_rand_hex_32'
      # Redis-backed lock so it shares the same infra as cache/messenger.
      LOCK_DSN: ${LOCK_DSN:-redis://redis:6379}
      # Redis (mandatory infra: cache, locks, rate-limiter, Messenger Redis
      # Streams transport, Centrifugo engine). Override for an external Redis.
      REDIS_DSN: ${REDIS_DSN:-redis://redis:6379}
      # Realtime gateway (Centrifugo). REALTIME_ENABLED toggles WS publishing;
      # set to false to run without realtime (chat falls back to REST).
      REALTIME_ENABLED: ${REALTIME_ENABLED:-true}
      REALTIME_API_URL: ${REALTIME_API_URL:-http://centrifugo:8000/api}
      REALTIME_API_KEY: ${REALTIME_API_KEY:-changeme_centrifugo_api_key}
      REALTIME_TOKEN_SECRET: ${REALTIME_TOKEN_SECRET:-changeme_centrifugo_token_secret}
      # Empty string = same-origin (Caddy reverse-proxies /connection/* to centrifugo).
      REALTIME_PUBLIC_WS_URL: ${REALTIME_PUBLIC_WS_URL:-}
      # Mailer (Mailhog for development)
      MAILER_DSN: smtp://mailhog:1025
      # External API Keys loaded from backend/.env via env_file
      # WhatsApp Business API - Fully Dynamic Multi-Number Support
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-false}
      # AI Provider API Keys (loaded from backend/.env via env_file above)
      AUTO_DOWNLOAD_MODELS: "false"
      ENABLE_LOCAL_GPT_OSS: "false"
      # reCAPTCHA (optional - disabled by default)
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY:-}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      RECAPTCHA_ENABLED: ${RECAPTCHA_ENABLED:-false}
      # Stripe Payment Integration - loaded from backend/.env via env_file
      # OAuth Social Login Providers (loaded from backend/.env via env_file)
      # Whisper.cpp - DISABLED in light mode (no models downloaded)
      WHISPER_BINARY: /usr/local/bin/whisper
      WHISPER_MODELS_PATH: /var/www/backend/var/whisper
      WHISPER_DEFAULT_MODEL: base
      WHISPER_ENABLED: "false"
      FFMPEG_BINARY: /usr/bin/ffmpeg
      # See docker-compose.yml for context — raises PHP's silent 20-file cap.
      PHP_MAX_FILE_UPLOADS: "100"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      centrifugo:
        condition: service_started
    restart: unless-stopped
    # Generous start_period so a slow first boot is never mistaken for a crash.
    # Minimal mode skips Ollama/Whisper so the backend usually boots fast, but
    # the first `up -d` still races image pulls + the dev-image build + the
    # one-time migrations/seed/cache warm. A failing probe inside start_period
    # keeps the container "starting" (not "unhealthy"), so nothing downstream
    # aborts; the moment /api/health answers 200 it flips to healthy. See
    # docker-compose.yml for the full rationale.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 300s
    networks:
      - synaplan-network

  # Redis - shared cache / locks / rate-limiter / Messenger Redis Streams /
  # Centrifugo engine. Single-node here, but the same image/config as the
  # production cluster. Memory-capped with LRU eviction (no persistence needed:
  # the durable source of truth is MariaDB).
  redis:
    # Pinned to Redis 7.4 for Centrifugo pub/sub compatibility (see
    # docker-compose.yml for the full rationale). Redis 8.x dropped publication
    # fan-out to the Centrifugo node and broke realtime delivery.
    image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: synaplan-redis
    command: >-
      redis-server
        --appendonly no
        --save ""
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - synaplan-network

  # Centrifugo - WebSocket / real-time gateway (live chat takeover, operator
  # notifications). Caddy/FrankenPHP reverse-proxies /connection/* and
  # /centrifugo/api/* so the browser connects same-origin. Auth via short-lived
  # JWTs minted by the PHP backend.
  centrifugo:
    image: centrifugo/centrifugo:v6.8.4@sha256:165ad23129a8fb28bd04b4468b3e6302656876fd5892ceaedc10139b32593fbc
    container_name: synaplan-centrifugo
    command: ["centrifugo", "-c", "/centrifugo/config.json"]
    volumes:
      - ./_docker/centrifugo/config.json:/centrifugo/config.json:ro
    environment:
      # Secrets must match the backend's REALTIME_* values above so JWTs verify
      # and HTTP publishes authenticate.
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: ${REALTIME_TOKEN_SECRET:-changeme_centrifugo_token_secret}
      CENTRIFUGO_HTTP_API_KEY: ${REALTIME_API_KEY:-changeme_centrifugo_api_key}
      CENTRIFUGO_ADMIN_PASSWORD: ${REALTIME_ADMIN_PASSWORD:-changeme_admin}
      CENTRIFUGO_ADMIN_SECRET: ${REALTIME_ADMIN_SECRET:-changeme_admin_secret}
      CENTRIFUGO_CLIENT_ALLOWED_ORIGINS: ${REALTIME_ALLOWED_ORIGINS:-*}
      # Dedicated logical DB (/3) keeps Centrifugo keys isolated from the
      # Symfony cache/lock/messenger which use /0 via REDIS_DSN.
      CENTRIFUGO_ENGINE_REDIS_ADDRESS: ${REALTIME_REDIS_ADDRESS:-redis://redis:6379/3}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - synaplan-network

  # Worker - consumes async messenger jobs (memory extraction, URL crawling,
  # reindexing). Runs in `prod` to dodge the dev-mode messenger:consume bug, and
  # recycles hourly (--time-limit) to bound Doctrine EM growth. Cloud-AI variant:
  # no Ollama, no Whisper models.
  worker:
    image: ghcr.io/metadist/synaplan:latest
    # Build the same lightweight `dev` stage as the backend (base + phpredis).
    # The worker bind-mounts ./backend and consumes Redis Streams via
    # messenger:consume, which needs phpredis at runtime; the dev stage is
    # source-independent so `up -d` stays a cache hit after the first build.
    pull_policy: build
    build:
      context: .
      dockerfile: _docker/backend/Dockerfile
      target: dev
    container_name: synaplan-worker
    env_file:
      - path: backend/.env
        required: false
    volumes:
      - ./backend:/var/www/backend
      - /var/www/backend/var/cache
      - ./plugins:/plugins:ro
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_URL: http://backend
      PLUGINS_DIR: /plugins
      DATABASE_WRITE_URL: mysql://synaplan_user:synaplan_password@db:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4
      DATABASE_READ_URL: mysql://synaplan_user:synaplan_password@db:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4
      OLLAMA_BASE_URL: ""
      TIKA_BASE_URL: http://tika:9998
      AI_DEFAULT_PROVIDER: groq
      TOKEN_SECRET: 'change_me_in_production_use_openssl_rand_hex_32'
      LOCK_DSN: ${LOCK_DSN:-redis://redis:6379}
      REDIS_DSN: ${REDIS_DSN:-redis://redis:6379}
      MAILER_DSN: smtp://mailhog:1025
      AUTO_DOWNLOAD_MODELS: "false"
      ENABLE_LOCAL_GPT_OSS: "false"
      WHISPER_ENABLED: "false"
      FFMPEG_BINARY: /usr/bin/ffmpeg
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "[worker] clearing prod cache..."
        rm -rf var/cache/prod
        php bin/console --env=prod cache:warmup

        until php bin/console --env=prod dbal:run-sql 'SELECT 1' >/dev/null 2>&1; do
          echo "[worker] waiting for db schema..."; sleep 3;
        done

        echo "[worker] db + cache ready, starting messenger:consume"
        exec php bin/console --env=prod messenger:consume \
          async_ai_high async_extract async_index \
          --time-limit=3600 --memory-limit=512M -v
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      disable: true
    networks:
      - synaplan-network

  # MariaDB 11.8 Database
  db:
    image: mariadb:12.3.2@sha256:b1c7bf836e64ed9406a8984af29509f40089d55cea14b32f12c4726a1f17104b
    container_name: synaplan-db
    command: --max-allowed-packet=256M --innodb-buffer-pool-size=512M
    environment:
      MYSQL_DATABASE: synaplan
      MYSQL_USER: synaplan_user
      MYSQL_PASSWORD: synaplan_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./_devextras/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb", "-h", "localhost", "-u", "root", "-proot_password", "-e", "SELECT 1;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - synaplan-network

  # Apache Tika - Document Text Extraction
  tika:
    image: apache/tika:3.3.1.0@sha256:90b7fa1dc018434075fce9e1d9b88b1e3d0ea6979d0cf86e116c79a8073ae973
    container_name: synaplan-tika
    command: -h 0.0.0.0 -p 9998
    ports:
      - "9999:9998"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:9998/version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - synaplan-network

  # phpMyAdmin (optional - for DB management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest@sha256:42a200db07b4e70fbf32c594ad4521cf16399b8e54bbb5adceae98e7566dfbeb
    container_name: synaplan-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: synaplan_user
      PMA_PASSWORD: synaplan_password
    ports:
      - "8082:80"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - synaplan-network

  # MailHog (SMTP testing)
  mailhog:
    image: mailhog/mailhog:latest@sha256:8d76a3d4ffa32a3661311944007a415332c4bb855657f4f6c57996405c009bea
    container_name: synaplan-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    restart: unless-stopped
    networks:
      - synaplan-network

volumes:
  mysql_data:
  # Note: No ollama_data or whisper_models volumes in standard mode

networks:
  synaplan-network:
    driver: bridge
