# Synaplan - Standard Installation (Recommended)
#
# This is the default configuration for Synaplan with all features:
# - Local Ollama AI models (gpt-oss:20b, bge-m3)
# - Whisper audio transcription with model downloads
# - All features enabled
# - Download size: ~9GB
#
# Usage:
#   docker compose up -d
#
# To switch to minimal install (cloud AI only, smaller footprint):
#   docker compose down
#   docker compose -f docker-compose-minimal.yml up -d
#
services:
  # Vue.js Frontend
  frontend:
    image: node:22@sha256:1031993481795705055273f2eef0c24597abdcb277d6e058c82f78cbbdef92a6
    container_name: synaplan-frontend
    working_dir: /app
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    environment:
      NODE_ENV: development
      BACKEND_URL: http://backend
    ports:
      - "5173:5173"
    volumes:
      - ./_docker/frontend/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
      - ./_devextras/frontend/docker-entrypoint.d:/docker-entrypoint.d:ro
      - ./frontend:/app
       # Anonymous volume to prevent host node_modules from being mounted (avoids platform-specific binary conflicts)
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - synaplan-network

  # Widget Build Watcher (dev only)
  # Memory-limited to prevent unbounded growth from Chokidar polling (#515).
  # Container auto-restarts on OOM thanks to restart policy.
  frontend-widgets:
    image: node:22@sha256:1031993481795705055273f2eef0c24597abdcb277d6e058c82f78cbbdef92a6
    container_name: synaplan-frontend-widgets
    working_dir: /app
    command: sh -c "npm ci && npm run build:widget -- --watch"
    environment:
      NODE_ENV: development
      NODE_OPTIONS: '--max-old-space-size=3072'
    mem_limit: 4g
    memswap_limit: 4g
    volumes:
      - ./frontend:/app
      # Anonymous volume to prevent host node_modules from being mounted
      - /app/node_modules
    restart: unless-stopped
    networks:
      - synaplan-network

  # Symfony PHP Backend
  # Serves both API and production frontend from frontend/dist
  backend:
    # Docker's embedded resolver (127.0.0.11) MUST be listed first — otherwise
    # only public DNS is used and service hostnames (db, ollama, …) never resolve,
    # which puts the backend in a crash loop and prevents the frontend schema step
    # from ever reaching a healthy API.
    dns:
      - 127.0.0.11
      - 8.8.8.8
      - 8.8.4.4
    image: ghcr.io/metadist/synaplan:latest
    build:
      context: .
      dockerfile: _docker/backend/Dockerfile
    container_name: synaplan-backend
    # Optional: Load extra config from backend/.env (for API keys, etc.)
    env_file:
      - path: backend/.env
        required: false
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      # Writable Symfony cache inside the container. Bind-mounted ./backend/var/cache often
      # inherits host UID/GID (e.g. macOS), so www-data cannot write and PHPUnit fails with
      # "Unable to write in the cache directory (/var/www/backend/var/cache/test)".
      - /var/www/backend/var/cache
      - ./frontend/dist:/var/www/frontend:ro
      - ./frontend/dist-widget:/var/www/widgets
      - ./plugins:/plugins:ro
      - ./_docker/backend/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./_docker/backend/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
      - ./_docker/backend/lib:/usr/local/bin/lib:ro
      - whisper_models:/var/www/backend/var/whisper:ro
      - ./_devextras/backend/docker-entrypoint.d:/docker-entrypoint.d:ro
    environment:
      APP_ENV: dev
      # APP_SECRET loaded from backend/.env (env_file above)
      APP_URL: http://localhost:8000
      PLUGINS_DIR: /plugins
      FRONTEND_URL: http://localhost:5173
      DATABASE_WRITE_URL: mysql://synaplan_user:synaplan_password@db:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4
      DATABASE_READ_URL: mysql://synaplan_user:synaplan_password@db:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4
      OLLAMA_BASE_URL: http://ollama:11434
      TRITON_SERVER_URL: ${TRITON_SERVER_URL:-}
      TIKA_BASE_URL: http://tika:9998
      AI_DEFAULT_PROVIDER: ollama
      # Token Configuration
      TOKEN_SECRET: 'change_me_in_production_use_openssl_rand_hex_32'
      LOCK_DSN: ${LOCK_DSN:-flock}
      # Mailer (Mailhog for development)
      MAILER_DSN: smtp://mailhog:1025
      # External API Keys loaded from backend/.env via env_file
      # WhatsApp Business API - Fully Dynamic Multi-Number Support
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-false}
      # AI Provider API Keys (loaded from backend/.env via env_file above)
      # GROQ_API_KEY is automatically loaded from backend/.env
      AUTO_DOWNLOAD_MODELS: ${AUTO_DOWNLOAD_MODELS:-true}
      ENABLE_LOCAL_GPT_OSS: ${ENABLE_LOCAL_GPT_OSS:-false}
      # reCAPTCHA (optional - disabled by default)
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY:-}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      RECAPTCHA_ENABLED: ${RECAPTCHA_ENABLED:-false}
      # Stripe Payment Integration - loaded from backend/.env via env_file
      # (STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_*)
      # OAuth Social Login Providers (loaded from backend/.env via env_file)
      # Whisper.cpp Service (Audio Transcription)
      WHISPER_BINARY: /usr/local/bin/whisper
      WHISPER_MODELS_PATH: /var/www/backend/var/whisper
      WHISPER_DEFAULT_MODEL: tiny
      WHISPER_ENABLED: "true"
      FFMPEG_BINARY: /usr/bin/ffmpeg
      # Piper TTS Service (self-hosted, voice conversations)
      SYNAPLAN_TTS_URL: ${SYNAPLAN_TTS_URL:-http://host.docker.internal:10200}
      # Raise PHP's `max_file_uploads` (base-php default is 20). The Files /
      # RAG manager allows selecting any number of files but PHP silently
      # truncates $_FILES at this limit, leaving the user with no error and
      # missing uploads. 100 here, combined with the explicit overflow guard
      # in FileController + client-side batching in filesService.ts, makes
      # the failure mode loud and the happy path support up to ~100 files
      # per request without batching. Override via PHP_MAX_FILE_UPLOADS in
      # your env if you need more / less. Honored by base-php's
      # 99-synaplan-env.ini render step.
      PHP_MAX_FILE_UPLOADS: "100"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # Platform-compatible alias so the same `QDRANT_URL=http://docker-host:6333`
      # that production uses also resolves in dev. Lets the dev backend talk to
      # either the synaplan-memories Qdrant (if running via its own compose) or
      # any other host-bound service without changing backend/.env.
      - "docker-host:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - synaplan-network

  # Symfony Messenger Worker
  #
  # Consumes the three async transports defined in
  # backend/config/packages/messenger.yaml so async jobs (chat
  # ProcessMessageCommand, embedding ReVectorize, plugin install,
  # widget crawling, ...) actually run in local dev. Without this the
  # Doctrine queue (`messenger_messages` table) just grows forever and
  # the UI hangs on any "queued / running in background" flow.
  #
  # Runs in `APP_ENV=prod` on purpose: the dev-mode TraceableEventDispatcher
  # has a long-standing bug where `messenger:consume` triggers
  #   Warning: Undefined array key "Symfony\Component\Messenger\Event\WorkerRunningEvent"
  # which kills the consumer on the first message. The web container stays
  # in `dev` so the profiler / debug toolbar still work for HTTP traffic.
  #
  # `--time-limit=3600` + `--memory-limit=512M` cooperate with `restart:
  # unless-stopped` to recycle the worker hourly, which is the standard
  # Symfony pattern to bound Doctrine EM growth on long-lived consumers.
  worker:
    image: ghcr.io/metadist/synaplan:latest
    build:
      context: .
      dockerfile: _docker/backend/Dockerfile
    container_name: synaplan-worker
    env_file:
      - path: backend/.env
        required: false
    volumes:
      - ./backend:/var/www/backend
      - /var/www/backend/var/cache
      - ./plugins:/plugins:ro
      - whisper_models:/var/www/backend/var/whisper:ro
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_URL: http://backend
      PLUGINS_DIR: /plugins
      DATABASE_WRITE_URL: mysql://synaplan_user:synaplan_password@db:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4
      DATABASE_READ_URL: mysql://synaplan_user:synaplan_password@db:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4
      OLLAMA_BASE_URL: http://ollama:11434
      TIKA_BASE_URL: http://tika:9998
      AI_DEFAULT_PROVIDER: ollama
      TOKEN_SECRET: 'change_me_in_production_use_openssl_rand_hex_32'
      LOCK_DSN: ${LOCK_DSN:-flock}
      MAILER_DSN: smtp://mailhog:1025
      AUTO_DOWNLOAD_MODELS: "false"
      ENABLE_LOCAL_GPT_OSS: ${ENABLE_LOCAL_GPT_OSS:-false}
      WHISPER_BINARY: /usr/local/bin/whisper
      WHISPER_MODELS_PATH: /var/www/backend/var/whisper
      WHISPER_DEFAULT_MODEL: tiny
      WHISPER_ENABLED: "true"
      FFMPEG_BINARY: /usr/bin/ffmpeg
      SYNAPLAN_TTS_URL: ${SYNAPLAN_TTS_URL:-http://host.docker.internal:10200}
    entrypoint: ["bash", "-c"]
    command:
      - |
        # Clear the prod cache BEFORE any console command runs. The cache lives
        # under var/cache/prod/ on the bind-mounted backend volume, so it
        # otherwise survives across container rebuilds and pins the compiled
        # DI container to whatever code revision happened to boot it first.
        #
        # If we ran a console command first (e.g. dbal:run-sql), Symfony would
        # try to load the stale compiled container and crash on any class that
        # was removed in the new code — for example after the Doctrine DBAL
        # upgrade the cached container references the removed
        # `Doctrine\DBAL\Schema\LegacySchemaManagerFactory` and the worker
        # deadlocks on its own DB readiness loop (issue #882). Same class of
        # symptom as ArgumentCountError / "Too few arguments to function
        # ::__construct()" after service constructor changes. Clearing on boot
        # is a few seconds and matches what every Symfony deploy does anyway.
        echo "[worker] clearing prod cache..."
        rm -rf var/cache/prod
        php bin/console --env=prod cache:warmup

        # Wait for the backend container to finish migrations, otherwise the
        # first consume cycle races against schema and crashes with
        # "Table doctrine_migration_versions doesn't exist".
        until php bin/console --env=prod dbal:run-sql 'SELECT 1' >/dev/null 2>&1; do
          echo "[worker] waiting for db schema..."; sleep 3;
        done

        echo "[worker] db + cache ready, starting messenger:consume"
        exec php bin/console --env=prod messenger:consume \
          async_ai_high async_extract async_index \
          --time-limit=3600 --memory-limit=512M -v
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    # Override the FrankenPHP HTTP healthcheck inherited from the base image —
    # the worker process doesn't bind to port 80, so the inherited probe would
    # always report unhealthy and cause noisy `docker compose ps` output. The
    # liveness signal we actually care about is "is messenger:consume still
    # processing?" which is observable via the messenger_messages table.
    healthcheck:
      disable: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "docker-host:host-gateway"
    networks:
      - synaplan-network

  # MariaDB 11.8 Database
  db:
    image: mariadb:12.2.2@sha256:350261292d0129fd4b24f537dcf05ecd3ebe34d39d5b592af551f38310e7a167
    container_name: synaplan-db
    command: --max-allowed-packet=256M --innodb-buffer-pool-size=512M
    environment:
      MYSQL_DATABASE: synaplan
      MYSQL_USER: synaplan_user
      MYSQL_PASSWORD: synaplan_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./_devextras/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb", "-h", "localhost", "-u", "root", "-proot_password", "-e", "SELECT 1;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - synaplan-network

  # Ollama - Local AI Models (GPU-accelerated if NVIDIA available)
  ollama:
    image: ollama/ollama:latest@sha256:a6149234667efc71d37766d61c1a16f24c33e4cd7a0bf4125c44a7e47e2419c4
    container_name: synaplan-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
    # GPU support should be configured via an override file if needed
    # Healthcheck uses bash /dev/tcp + HTTP probe (the ollama/ollama image has
    # no curl/wget/nc). Measures the round-trip and treats anything slower than
    # 3000 ms as not-yet-ready — protects against the warm-up window where the
    # API socket is open but the runtime is still loading models.
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - |
          T0=$$EPOCHREALTIME
          exec 3<>/dev/tcp/localhost/11434 || exit 1
          printf 'GET /api/tags HTTP/1.0\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
          read -r status <&3
          ms=$$(awk -v a="$$T0" -v b="$$EPOCHREALTIME" 'BEGIN{printf "%.0f",(b-a)*1000}')
          echo "ollama probe: $${status%$$'\r'} ($${ms} ms)"
          [[ "$$status" == *"200 OK"* ]] || exit 1
          [ "$$ms" -lt 3000 ] || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - synaplan-network

  # Apache Tika - Document Text Extraction
  tika:
    image: apache/tika:3.3.1.0@sha256:90b7fa1dc018434075fce9e1d9b88b1e3d0ea6979d0cf86e116c79a8073ae973
    container_name: synaplan-tika
    command: -h 0.0.0.0 -p 9998
    ports:
      - "9999:9998"
    # Healthcheck uses bash /dev/tcp + HTTP probe (the apache/tika image has no
    # curl/wget). Measures the round-trip on /version and treats anything
    # slower than 3000 ms as not-yet-ready — Tika's JVM warm-up can keep the
    # port open long before the parser registry is actually responsive.
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - |
          T0=$$EPOCHREALTIME
          exec 3<>/dev/tcp/localhost/9998 || exit 1
          printf 'GET /version HTTP/1.0\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
          read -r status <&3
          ms=$$(awk -v a="$$T0" -v b="$$EPOCHREALTIME" 'BEGIN{printf "%.0f",(b-a)*1000}')
          echo "tika probe: $${status%$$'\r'} ($${ms} ms)"
          [[ "$$status" == *"200 OK"* ]] || exit 1
          [ "$$ms" -lt 3000 ] || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - synaplan-network

  # Whisper Models Download (runs once)
  whisper-models:
    image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
    container_name: synaplan-whisper-models
    command: >
      sh -c '
        apk add --no-cache curl ca-certificates &&
        mkdir -p /models &&
        if [ ! -f "/models/ggml-tiny.bin" ]; then
          echo "Downloading Whisper tiny model..." &&
          curl -fL --retry 3 --retry-delay 5 --max-time 600 \
            -o "/models/ggml-tiny.bin" \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin" &&
          chmod 644 /models/*.bin &&
          echo "Whisper model downloaded successfully"
        else
          echo "Whisper model already exists, skipping download"
        fi
      '
    volumes:
      - whisper_models:/models
    restart: "no"
    networks:
      - synaplan-network

  # phpMyAdmin (optional - for DB management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest@sha256:42a200db07b4e70fbf32c594ad4521cf16399b8e54bbb5adceae98e7566dfbeb
    container_name: synaplan-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: synaplan_user
      PMA_PASSWORD: synaplan_password
    ports:
      - "8082:80"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - synaplan-network

  # MailHog (SMTP testing)
  mailhog:
    image: mailhog/mailhog:latest@sha256:8d76a3d4ffa32a3661311944007a415332c4bb855657f4f6c57996405c009bea
    container_name: synaplan-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    restart: unless-stopped
    networks:
      - synaplan-network

  # Generates a self-signed TLS certificate for Keycloak HTTPS (runs once)
  keycloak_certs:
    image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
    container_name: synaplan-keycloak-certs
    command: sh -c 'if [ -f /certs/cert.pem ]; then echo "Keycloak TLS cert exists"; exit 0; fi && apk add --no-cache openssl && openssl req -x509 -newkey rsa:2048 -keyout /certs/key.pem -out /certs/cert.pem -days 3650 -nodes -subj "/CN=host.docker.internal" -addext "subjectAltName=DNS:host.docker.internal,DNS:keycloak,DNS:localhost" && chmod 644 /certs/*.pem && echo "Keycloak TLS cert generated"'
    volumes:
      - keycloak_certs:/certs
    profiles: [oidc]
    restart: "no"
    networks:
      - synaplan-network

  # Keycloak OIDC Identity Provider (optional - activated with --profile oidc)
  keycloak:
    image: quay.io/keycloak/keycloak:26.6@sha256:f9ba7b2af90db8dc749a57ca9aedca51e840cb9224441ab546a968da941da900
    container_name: synaplan-keycloak
    depends_on:
      keycloak_certs:
        condition: service_completed_successfully
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_FEATURES: token-exchange:v1,admin-fine-grained-authz:v1
      KC_HOSTNAME: ${KC_HOSTNAME:-https://host.docker.internal:8443}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/cert.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/key.pem
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - keycloak_certs:/opt/keycloak/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    profiles: [oidc]
    restart: "no"
    networks:
      - synaplan-network

  keycloak_setup:
    image: quay.io/keycloak/keycloak:26.6@sha256:f9ba7b2af90db8dc749a57ca9aedca51e840cb9224441ab546a968da941da900
    container_name: synaplan-keycloak-setup
    depends_on:
      keycloak:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/setup/setup.sh"]
    environment:
      KC_SERVER: http://keycloak:8080
      KC_CALLBACK: http://localhost:8000/api/v1/auth/keycloak/callback
      KC_ORIGIN: http://localhost:8000
      KC_CLIENT_ID: ${OIDC_CLIENT_ID:-synaplan-app}
      KC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-test-oidc-secret}
    volumes:
      - ./_docker/keycloak/setup.sh:/setup/setup.sh:ro
    profiles: [oidc]
    restart: "no"
    networks:
      - synaplan-network

  # Qdrant Vector Database (memories + document vectors)
  qdrant:
    image: qdrant/qdrant:v1.18.1@sha256:45f8e3ddc2570a4d029877e1b5ec1045c19b3852b4e22a55c7f43b05aea0ca89
    container_name: synaplan-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - synaplan-network

volumes:
  mysql_data:
  ollama_data:
  whisper_models:
  qdrant_storage:
  keycloak_certs:

networks:
  synaplan-network:
    driver: bridge

