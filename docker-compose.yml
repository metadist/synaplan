# Synaplan - Standard Installation (Recommended)
#
# This is the default configuration for Synaplan with all features:
# - Local Ollama AI models (gpt-oss:20b, bge-m3)
# - Whisper audio transcription with model downloads
# - All features enabled
# - Download size: ~9GB
#
# Usage:
#   docker compose up -d
#
# To switch to minimal install (cloud AI only, smaller footprint):
#   docker compose down
#   docker compose -f docker-compose-minimal.yml up -d
#
services:
  # Vue.js Frontend
  frontend:
    image: node:22@sha256:e0d149b4727ac0c20d9774e801e423d7a946a0bffced886f42cfe9cd3c67820a
    container_name: synaplan-frontend
    working_dir: /app
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    environment:
      NODE_ENV: development
      BACKEND_URL: http://backend
      # Vite dev-server host check (anti DNS-rebinding). EMPTY by default →
      # ignored, so the dev server answers to ALL hosts out of the box (works
      # behind any domain / reverse proxy). Set ALLOWED_HOSTS to a
      # comma-separated allow-list to restrict to ONLY those hosts.
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-}
    ports:
      - "5173:5173"
    volumes:
      - ./_docker/frontend/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
      - ./_devextras/frontend/docker-entrypoint.d:/docker-entrypoint.d:ro
      - ./frontend:/app
       # Anonymous volume to prevent host node_modules from being mounted (avoids platform-specific binary conflicts)
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - synaplan-network

  # Widget Build Watcher (dev only)
  # Memory-limited to prevent unbounded growth from Chokidar polling (#515).
  # Container auto-restarts on OOM thanks to restart policy.
  # 6g: the Rolldown-based Vite (>= 8.0.16) peaks above the old 4g cap while
  # rendering chunks (native binary + JS heap), which OOM-killed every build
  # and left dist-widget without widget.js.
  frontend-widgets:
    image: node:22@sha256:e0d149b4727ac0c20d9774e801e423d7a946a0bffced886f42cfe9cd3c67820a
    container_name: synaplan-frontend-widgets
    working_dir: /app
    command: sh -c "npm ci && npm run build:widget -- --watch"
    environment:
      NODE_ENV: development
      NODE_OPTIONS: '--max-old-space-size=4096'
    mem_limit: 6g
    memswap_limit: 6g
    volumes:
      - ./frontend:/app
      # Anonymous volume to prevent host node_modules from being mounted
      - /app/node_modules
    restart: unless-stopped
    networks:
      - synaplan-network

  # Symfony PHP Backend
  # Serves both API and production frontend from frontend/dist
  backend:
    # Docker's embedded resolver (127.0.0.11) MUST be listed first — otherwise
    # only public DNS is used and service hostnames (db, ollama, …) never resolve,
    # which puts the backend in a crash loop and prevents the frontend schema step
    # from ever reaching a healthy API.
    dns:
      - 127.0.0.11
      - 8.8.8.8
      - 8.8.4.4
    image: ghcr.io/metadist/synaplan:latest
    # Always build the lightweight `dev` stage locally so the image carries
    # ext-redis (phpredis) without baking the app. The published :latest can be
    # stale; reusing it breaks composer install (symfony/redis-messenger platform
    # req) and the worker's Redis Streams consumer. The dev stage is independent
    # of backend source, so every `up -d` is a cache hit after the first build.
    pull_policy: build
    build:
      context: .
      dockerfile: _docker/backend/Dockerfile
      target: dev
    container_name: synaplan-backend
    # Optional: Load extra config from backend/.env (for API keys, etc.)
    env_file:
      - path: backend/.env
        required: false
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      # Writable Symfony cache inside the container. Bind-mounted ./backend/var/cache often
      # inherits host UID/GID (e.g. macOS), so www-data cannot write and PHPUnit fails with
      # "Unable to write in the cache directory (/var/www/backend/var/cache/test)".
      - /var/www/backend/var/cache
      - ./frontend/dist:/var/www/frontend:ro
      - ./frontend/dist-widget:/var/www/widgets
      - ./plugins:/plugins:ro
      - ./_docker/backend/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./_docker/backend/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
      - ./_docker/backend/lib:/usr/local/bin/lib:ro
      - whisper_models:/var/www/backend/var/whisper:ro
      - ./_devextras/backend/docker-entrypoint.d:/docker-entrypoint.d:ro
    environment:
      APP_ENV: dev
      # APP_SECRET loaded from backend/.env (env_file above)
      APP_URL: http://localhost:8000
      PLUGINS_DIR: /plugins
      FRONTEND_URL: http://localhost:5173
      DATABASE_WRITE_URL: mysql://synaplan_user:synaplan_password@db:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4
      DATABASE_READ_URL: mysql://synaplan_user:synaplan_password@db:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4
      OLLAMA_BASE_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      TRITON_SERVER_URL: ${TRITON_SERVER_URL:-}
      TIKA_BASE_URL: http://tika:9998
      AI_DEFAULT_PROVIDER: ollama
      # Token Configuration
      TOKEN_SECRET: 'change_me_in_production_use_openssl_rand_hex_32'
      LOCK_DSN: ${LOCK_DSN:-redis://redis:6379}
      # Redis (general-purpose: cache, locks, rate-limiter, realtime fan-out)
      # Override REDIS_DSN for production (e.g. redis://redis-cluster.internal:6379).
      REDIS_DSN: ${REDIS_DSN:-redis://redis:6379}
      # Realtime gateway (Centrifugo). REALTIME_ENABLED toggles WS publishing
      # at runtime; there is no SSE fallback after the realtime cleanup phase.
      REALTIME_ENABLED: ${REALTIME_ENABLED:-true}
      REALTIME_API_URL: ${REALTIME_API_URL:-http://centrifugo:8000/api}
      REALTIME_API_KEY: ${REALTIME_API_KEY:-changeme_centrifugo_api_key}
      REALTIME_TOKEN_SECRET: ${REALTIME_TOKEN_SECRET:-changeme_centrifugo_token_secret}
      # WebSocket URL exposed to browser clients via /api/v1/config/runtime.
      # Empty string = same-origin (Caddy reverse-proxies /connection/* to centrifugo).
      REALTIME_PUBLIC_WS_URL: ${REALTIME_PUBLIC_WS_URL:-}
      # Mailer (Mailhog for development)
      MAILER_DSN: smtp://mailhog:1025
      # External API Keys loaded from backend/.env via env_file
      # WhatsApp Business API - Fully Dynamic Multi-Number Support
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-false}
      # AI Provider API Keys (loaded from backend/.env via env_file above)
      # GROQ_API_KEY is automatically loaded from backend/.env
      AUTO_DOWNLOAD_MODELS: ${AUTO_DOWNLOAD_MODELS:-true}
      ENABLE_LOCAL_GPT_OSS: ${ENABLE_LOCAL_GPT_OSS:-false}
      # reCAPTCHA (optional - disabled by default)
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY:-}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      RECAPTCHA_ENABLED: ${RECAPTCHA_ENABLED:-false}
      # Stripe Payment Integration - loaded from backend/.env via env_file
      # (STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_*)
      # OAuth Social Login Providers (loaded from backend/.env via env_file)
      # Whisper.cpp Service (Audio Transcription)
      WHISPER_BINARY: /usr/local/bin/whisper
      WHISPER_MODELS_PATH: /var/www/backend/var/whisper
      WHISPER_DEFAULT_MODEL: tiny
      WHISPER_ENABLED: "true"
      FFMPEG_BINARY: /usr/bin/ffmpeg
      # Piper TTS Service (self-hosted, voice conversations)
      SYNAPLAN_TTS_URL: ${SYNAPLAN_TTS_URL:-http://host.docker.internal:10200}
      # Raise PHP's `max_file_uploads` (base-php default is 20). The Files /
      # RAG manager allows selecting any number of files but PHP silently
      # truncates $_FILES at this limit, leaving the user with no error and
      # missing uploads. 100 here, combined with the explicit overflow guard
      # in FileController + client-side batching in filesService.ts, makes
      # the failure mode loud and the happy path support up to ~100 files
      # per request without batching. Override via PHP_MAX_FILE_UPLOADS in
      # your env if you need more / less. Honored by base-php's
      # 99-synaplan-env.ini render step.
      PHP_MAX_FILE_UPLOADS: "100"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      centrifugo:
        condition: service_started
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # Platform-compatible alias so the same `QDRANT_URL=http://docker-host:6333`
      # that production uses also resolves in dev. Lets the dev backend talk to
      # either the synaplan-memories Qdrant (if running via its own compose) or
      # any other host-bound service without changing backend/.env.
      - "docker-host:host-gateway"
    # Generous start_period so a slow first boot never blocks the frontend.
    #
    # The frontend `depends_on: backend: service_healthy` — it is only created
    # once this probe passes. On a FRESH checkout the very first `up -d` runs
    # the backend boot (migrations + app:seed + cache warm) WHILE the machine is
    # saturated pulling images, building the dev image, and downloading multi-GB
    # Ollama models (bge-m3 + gpt-oss:20b). On a loaded host the first healthy
    # /api/health routinely lands well past 10 minutes.
    #
    # Docker's healthcheck rule: while inside `start_period`, a FAILING probe
    # keeps the container in state "starting" (NOT "unhealthy"), so
    # `depends_on: service_healthy` keeps WAITING instead of aborting the
    # frontend with "dependency failed to start: container synaplan-backend is
    # unhealthy". The moment /api/health answers 200 the container flips to
    # "healthy" — the long start_period is only an upper bound, it does not delay
    # a backend that boots quickly. (Model downloads themselves are backgrounded
    # in the entrypoint and never block FrankenPHP from binding port 80.)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 900s
    networks:
      - synaplan-network

  # Symfony Messenger Worker
  #
  # Consumes the three async transports defined in
  # backend/config/packages/messenger.yaml so async jobs (chat
  # ProcessMessageCommand, embedding ReVectorize, plugin install,
  # widget crawling, ...) actually run in local dev. Without this the
  # Doctrine queue (`messenger_messages` table) just grows forever and
  # the UI hangs on any "queued / running in background" flow.
  #
  # Runs in `APP_ENV=prod` on purpose: the dev-mode TraceableEventDispatcher
  # has a long-standing bug where `messenger:consume` triggers
  #   Warning: Undefined array key "Symfony\Component\Messenger\Event\WorkerRunningEvent"
  # which kills the consumer on the first message. The web container stays
  # in `dev` so the profiler / debug toolbar still work for HTTP traffic.
  #
  # `--time-limit=3600` + `--memory-limit=512M` cooperate with `restart:
  # unless-stopped` to recycle the worker hourly, which is the standard
  # Symfony pattern to bound Doctrine EM growth on long-lived consumers.
  worker:
    image: ghcr.io/metadist/synaplan:latest
    # Build the same lightweight `dev` stage as the backend (base + phpredis).
    # The worker bind-mounts ./backend and consumes Redis Streams via
    # messenger:consume, which needs phpredis at runtime; the dev stage is
    # source-independent so `up -d` stays a cache hit after the first build.
    pull_policy: build
    build:
      context: .
      dockerfile: _docker/backend/Dockerfile
      target: dev
    container_name: synaplan-worker
    env_file:
      - path: backend/.env
        required: false
    volumes:
      - ./backend:/var/www/backend
      - /var/www/backend/var/cache
      - ./plugins:/plugins:ro
      - whisper_models:/var/www/backend/var/whisper:ro
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_URL: http://backend
      PLUGINS_DIR: /plugins
      DATABASE_WRITE_URL: mysql://synaplan_user:synaplan_password@db:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4
      DATABASE_READ_URL: mysql://synaplan_user:synaplan_password@db:3306/synaplan?serverVersion=mariadb-12.2.2&charset=utf8mb4
      OLLAMA_BASE_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      TIKA_BASE_URL: http://tika:9998
      AI_DEFAULT_PROVIDER: ollama
      TOKEN_SECRET: 'change_me_in_production_use_openssl_rand_hex_32'
      LOCK_DSN: ${LOCK_DSN:-redis://redis:6379}
      # Redis (general-purpose: cache, locks, rate-limiter, Messenger Redis Streams
      # transport). The worker consumes async_ai_high/async_extract/async_index,
      # all of which use the Redis transport, so REDIS_DSN is mandatory here.
      REDIS_DSN: ${REDIS_DSN:-redis://redis:6379}
      MAILER_DSN: smtp://mailhog:1025
      AUTO_DOWNLOAD_MODELS: "false"
      ENABLE_LOCAL_GPT_OSS: ${ENABLE_LOCAL_GPT_OSS:-false}
      WHISPER_BINARY: /usr/local/bin/whisper
      WHISPER_MODELS_PATH: /var/www/backend/var/whisper
      WHISPER_DEFAULT_MODEL: tiny
      WHISPER_ENABLED: "true"
      FFMPEG_BINARY: /usr/bin/ffmpeg
      SYNAPLAN_TTS_URL: ${SYNAPLAN_TTS_URL:-http://host.docker.internal:10200}
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -u

        # Fail-fast diagnostic: a broken bind-mount (the codebase missing from
        # /var/www/backend, leaving only the anonymous var/cache volume) used
        # to make the DB-wait loop below silently hang forever — every retry
        # hit "Could not open input file: bin/console" but the error was
        # suppressed, so messenger:consume never started and every queued
        # AdvanceMediaJobCommand sat unprocessed. Crash loudly instead.
        if [ ! -f bin/console ]; then
          echo "[worker] FATAL: bin/console missing under $(pwd)." >&2
          echo "[worker] The ./backend bind-mount is broken; restart the worker" >&2
          echo "[worker] container or rebuild the dev stack."                   >&2
          exit 64
        fi

        # Clear the prod cache BEFORE any console command runs. The cache lives
        # under var/cache/prod/ on the bind-mounted backend volume, so it
        # otherwise survives across container rebuilds and pins the compiled
        # DI container to whatever code revision happened to boot it first.
        #
        # If we ran a console command first (e.g. dbal:run-sql), Symfony would
        # try to load the stale compiled container and crash on any class that
        # was removed in the new code — for example after the Doctrine DBAL
        # upgrade the cached container references the removed
        # `Doctrine\DBAL\Schema\LegacySchemaManagerFactory` and the worker
        # deadlocks on its own DB readiness loop (issue #882). Same class of
        # symptom as ArgumentCountError / "Too few arguments to function
        # ::__construct()" after service constructor changes. Clearing on boot
        # is a few seconds and matches what every Symfony deploy does anyway.
        echo "[worker] clearing prod cache..."
        rm -rf var/cache/prod
        if ! php bin/console --env=prod cache:warmup; then
          echo "[worker] FATAL: cache:warmup failed — refusing to start." >&2
          exit 65
        fi

        # Wait for the backend container to finish migrations, otherwise the
        # first consume cycle races against schema and crashes with
        # "Table doctrine_migration_versions doesn't exist".
        #
        # Bounded: 60 attempts × 3s = ~3 min ceiling. After that we exit so the
        # `restart: unless-stopped` policy + `docker compose ps` surface the
        # problem instead of letting the worker pretend it is healthy forever.
        attempt=0
        max_attempts=60
        while ! php bin/console --env=prod dbal:run-sql 'SELECT 1' >/dev/null 2>&1; do
          attempt=$$((attempt + 1))
          if [ "$$attempt" -ge "$$max_attempts" ]; then
            echo "[worker] FATAL: db schema not ready after $$((max_attempts * 3))s." >&2
            php bin/console --env=prod dbal:run-sql 'SELECT 1' >&2 || true
            exit 66
          fi
          # Echo the underlying error every 10 attempts so a real problem
          # (auth failure, wrong host, broken vendor/) is visible.
          if [ $$((attempt % 10)) -eq 1 ]; then
            echo "[worker] waiting for db schema... (attempt $$attempt/$$max_attempts)" >&2
            php bin/console --env=prod dbal:run-sql 'SELECT 1' >&2 || true
          fi
          sleep 3
        done

        # Liveness sentinel — touched on boot, refreshed by the consumer (see
        # messenger middleware in production for periodic refresh). The
        # healthcheck below treats an old sentinel as unhealthy.
        mkdir -p var/worker
        date +%s > var/worker/last_alive

        echo "[worker] db + cache ready, starting messenger:consume"
        exec php bin/console --env=prod messenger:consume \
          async_ai_high async_extract async_index \
          --time-limit=3600 --memory-limit=512M -v
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    # Worker liveness: the boot script writes var/worker/last_alive once
    # messenger:consume is about to start, and the consumer would refresh it on
    # every message. A missing or stale sentinel (>5 min) means the worker is
    # not actually consuming — surfaces the silent-hang class of failure that
    # took us hours to diagnose (broken bind mount → infinite "waiting for db
    # schema..." loop with no consumer ever starting).
    healthcheck:
      test:
        - "CMD-SHELL"
        - "test -f var/worker/last_alive && test $$(( $$(date +%s) - $$(cat var/worker/last_alive) )) -lt 300"
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "docker-host:host-gateway"
    networks:
      - synaplan-network

  # MariaDB 11.8 Database
  db:
    image: mariadb:12.3.2@sha256:b1c7bf836e64ed9406a8984af29509f40089d55cea14b32f12c4726a1f17104b
    container_name: synaplan-db
    command: --max-allowed-packet=256M --innodb-buffer-pool-size=512M
    environment:
      MYSQL_DATABASE: synaplan
      MYSQL_USER: synaplan_user
      MYSQL_PASSWORD: synaplan_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./_devextras/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb", "-h", "localhost", "-u", "root", "-proot_password", "-e", "SELECT 1;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - synaplan-network

  # ----------------------------------------------------------------------------
  # Redis - General-purpose in-memory data store.
  #
  # Used by:
  #   * Symfony cache.adapter.redis (pools: app, widget_events, model_config, ...)
  #   * Symfony Lock component (LOCK_DSN=redis://redis:6379)
  #   * Symfony Rate-Limiter storage (per-user quotas)
  #   * Centrifugo Redis engine (cross-node WebSocket pub/sub)
  #   * Symfony Messenger transports (Redis Streams, consumed by the worker)
  #   * Native PHP sessions (RedisSessionHandler)
  #
  # Production note: replace with managed/clustered Redis (e.g. one shared
  # instance for all 3 web nodes). Keep --maxmemory and eviction policy in
  # mind once persistent caches grow beyond a few hundred MB.
  # ----------------------------------------------------------------------------
  redis:
    # Pinned to Redis 7.4: Centrifugo v6.4.0 (rueidis/RESP3) reliably receives
    # client publications from 7.x, whereas Redis 8.x dropped pub/sub fan-out to
    # the Centrifugo node (control messages arrived, publications did not),
    # which silently broke realtime delivery to dashboard + widget clients.
    image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: synaplan-redis
    command: >-
      redis-server
        --appendonly no
        --save ""
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - synaplan-network

  # ----------------------------------------------------------------------------
  # Centrifugo - WebSocket / real-time gateway.
  #
  # One instance per web node in production. All instances share state through
  # the Redis engine, so a publish on node A reaches subscribers on node B.
  # Caddy/FrankenPHP reverse-proxies `/connection/*` and `/centrifugo/api/*`
  # so browsers connect to the same origin (Cloudflare-friendly, no CORS).
  # Authentication uses short-lived JWTs issued by the PHP backend.
  # ----------------------------------------------------------------------------
  centrifugo:
    image: centrifugo/centrifugo:v6.8.3@sha256:723aac6035075d62f5aba0e36a60be05d62019df86fe7a59f34857a6a099a10e
    container_name: synaplan-centrifugo
    command: ["centrifugo", "-c", "/centrifugo/config.json"]
    volumes:
      - ./_docker/centrifugo/config.json:/centrifugo/config.json:ro
    environment:
      # Real configuration lives in config.json; these vars override secrets so
      # production deployments don't ship credentials in the repo. Centrifugo v6
      # nests config under typed sections, so env var names mirror the JSON path
      # (CENTRIFUGO_<SECTION>_<FIELD>, with `_` for nested levels).
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: ${REALTIME_TOKEN_SECRET:-changeme_centrifugo_token_secret}
      CENTRIFUGO_HTTP_API_KEY: ${REALTIME_API_KEY:-changeme_centrifugo_api_key}
      CENTRIFUGO_ADMIN_PASSWORD: ${REALTIME_ADMIN_PASSWORD:-changeme_admin}
      CENTRIFUGO_ADMIN_SECRET: ${REALTIME_ADMIN_SECRET:-changeme_admin_secret}
      # Space-separated list of origins allowed to upgrade to WebSocket.
      # Leave default for dev; in production set to your domain(s).
      CENTRIFUGO_CLIENT_ALLOWED_ORIGINS: ${REALTIME_ALLOWED_ORIGINS:-*}
      # Redis engine address (cross-node pub/sub). Override REALTIME_REDIS_ADDRESS
      # in production to point at the shared/managed Redis, e.g.
      # redis://redis-prod.internal:6379/3. Keep the dedicated logical DB suffix
      # (/3) — it isolates Centrifugo keys from Symfony cache/lock/messenger which
      # use /0 via REDIS_DSN. (For Redis Cluster use a host without a DB suffix.)
      CENTRIFUGO_ENGINE_REDIS_ADDRESS: ${REALTIME_REDIS_ADDRESS:-redis://redis:6379/3}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - synaplan-network

  # Ollama - Local AI Models (GPU-accelerated if NVIDIA available)
  ollama:
    image: ollama/ollama:latest@sha256:bfc9c6d53cc6989aa5131a6fde6b162b2802d4d337657f3253b5f69579bddeee
    container_name: synaplan-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
    # GPU support should be configured via an override file if needed
    # Healthcheck uses bash /dev/tcp + HTTP probe (the ollama/ollama image has
    # no curl/wget/nc). Measures the round-trip and treats anything slower than
    # 3000 ms as not-yet-ready — protects against the warm-up window where the
    # API socket is open but the runtime is still loading models.
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - |
          T0=$$EPOCHREALTIME
          exec 3<>/dev/tcp/localhost/11434 || exit 1
          printf 'GET /api/tags HTTP/1.0\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
          read -r status <&3
          ms=$$(awk -v a="$$T0" -v b="$$EPOCHREALTIME" 'BEGIN{printf "%.0f",(b-a)*1000}')
          echo "ollama probe: $${status%$$'\r'} ($${ms} ms)"
          [[ "$$status" == *"200 OK"* ]] || exit 1
          [ "$$ms" -lt 3000 ] || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - synaplan-network

  # Apache Tika - Document Text Extraction
  tika:
    image: apache/tika:3.3.1.0@sha256:90b7fa1dc018434075fce9e1d9b88b1e3d0ea6979d0cf86e116c79a8073ae973
    container_name: synaplan-tika
    command: -h 0.0.0.0 -p 9998
    ports:
      - "9999:9998"
    # Healthcheck uses bash /dev/tcp + HTTP probe (the apache/tika image has no
    # curl/wget). Measures the round-trip on /version and treats anything
    # slower than 3000 ms as not-yet-ready — Tika's JVM warm-up can keep the
    # port open long before the parser registry is actually responsive.
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - |
          T0=$$EPOCHREALTIME
          exec 3<>/dev/tcp/localhost/9998 || exit 1
          printf 'GET /version HTTP/1.0\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
          read -r status <&3
          ms=$$(awk -v a="$$T0" -v b="$$EPOCHREALTIME" 'BEGIN{printf "%.0f",(b-a)*1000}')
          echo "tika probe: $${status%$$'\r'} ($${ms} ms)"
          [[ "$$status" == *"200 OK"* ]] || exit 1
          [ "$$ms" -lt 3000 ] || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - synaplan-network

  # Whisper Models Download (runs once)
  whisper-models:
    image: alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    container_name: synaplan-whisper-models
    command: >
      sh -c '
        apk add --no-cache curl ca-certificates &&
        mkdir -p /models &&
        if [ ! -f "/models/ggml-tiny.bin" ]; then
          echo "Downloading Whisper tiny model..." &&
          curl -fL --retry 3 --retry-delay 5 --max-time 600 \
            -o "/models/ggml-tiny.bin" \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin" &&
          chmod 644 /models/*.bin &&
          echo "Whisper model downloaded successfully"
        else
          echo "Whisper model already exists, skipping download"
        fi
      '
    volumes:
      - whisper_models:/models
    restart: "no"
    networks:
      - synaplan-network

  # phpMyAdmin (optional - for DB management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest@sha256:42a200db07b4e70fbf32c594ad4521cf16399b8e54bbb5adceae98e7566dfbeb
    container_name: synaplan-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: synaplan_user
      PMA_PASSWORD: synaplan_password
    ports:
      - "8082:80"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - synaplan-network

  # MailHog (SMTP testing)
  mailhog:
    image: mailhog/mailhog:latest@sha256:8d76a3d4ffa32a3661311944007a415332c4bb855657f4f6c57996405c009bea
    container_name: synaplan-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    restart: unless-stopped
    networks:
      - synaplan-network

  # Generates a self-signed TLS certificate for Keycloak HTTPS (runs once)
  keycloak_certs:
    image: alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    container_name: synaplan-keycloak-certs
    command: sh -c 'if [ -f /certs/cert.pem ]; then echo "Keycloak TLS cert exists"; exit 0; fi && apk add --no-cache openssl && openssl req -x509 -newkey rsa:2048 -keyout /certs/key.pem -out /certs/cert.pem -days 3650 -nodes -subj "/CN=host.docker.internal" -addext "subjectAltName=DNS:host.docker.internal,DNS:keycloak,DNS:localhost" && chmod 644 /certs/*.pem && echo "Keycloak TLS cert generated"'
    volumes:
      - keycloak_certs:/certs
    profiles: [oidc]
    restart: "no"
    networks:
      - synaplan-network

  # Keycloak OIDC Identity Provider (optional - activated with --profile oidc)
  keycloak:
    image: quay.io/keycloak/keycloak:26.6@sha256:5fdbf2dbb5897cc34e82de49d13e23db011f9925089dbc555fc095f2c8bc1dac
    container_name: synaplan-keycloak
    depends_on:
      keycloak_certs:
        condition: service_completed_successfully
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_FEATURES: token-exchange:v1,admin-fine-grained-authz:v1
      KC_HOSTNAME: ${KC_HOSTNAME:-https://host.docker.internal:8443}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/cert.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/key.pem
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - keycloak_certs:/opt/keycloak/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    profiles: [oidc]
    restart: "no"
    networks:
      - synaplan-network

  keycloak_setup:
    image: quay.io/keycloak/keycloak:26.6@sha256:5fdbf2dbb5897cc34e82de49d13e23db011f9925089dbc555fc095f2c8bc1dac
    container_name: synaplan-keycloak-setup
    depends_on:
      keycloak:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/setup/setup.sh"]
    environment:
      KC_SERVER: http://keycloak:8080
      KC_CALLBACK: http://localhost:8000/api/v1/auth/keycloak/callback
      KC_ORIGIN: http://localhost:8000
      KC_CLIENT_ID: ${OIDC_CLIENT_ID:-synaplan-app}
      KC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-test-oidc-secret}
    volumes:
      - ./_docker/keycloak/setup.sh:/setup/setup.sh:ro
    profiles: [oidc]
    restart: "no"
    networks:
      - synaplan-network

  # Qdrant Vector Database (memories + document vectors)
  qdrant:
    image: qdrant/qdrant:v1.18.2@sha256:75eab8c4ba42096724fdcfde8b4de0b5713d529dde32f285a1f86fdcb2c9e50c
    container_name: synaplan-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - synaplan-network

volumes:
  mysql_data:
  ollama_data:
  whisper_models:
  qdrant_storage:
  keycloak_certs:

networks:
  synaplan-network:
    driver: bridge

