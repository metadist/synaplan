<!--
  OpenCloud recognition mark (stylised cloud, not the official wordmark).
  OpenCloud is a young project (2025 fork-line of ownCloud Infinite Scale,
  see https://opencloud.eu/). A faithful wordmark wasn't bundled here to
  avoid shipping outdated brand artwork; replace this file with the
  official SVG from opencloud.eu/press the moment it stabilises.
  Brand-adjacent colour: #4318FF (the violet that runs through their
  current site + GitHub avatar).
-->
